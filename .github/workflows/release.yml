name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bundle:
    name: bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run check && npm run validate:schemas && npm run build

      - name: Build release bundle
        run: npm run package:release

      - name: Smoke release bundle
        run: |
          tmp="$(mktemp -d)"
          tar -xzf release/openathor.tar.gz -C "$tmp"
          "$tmp/openathor/dist/cli.js" --version
          "$tmp/openathor/dist/cli.js" init "$tmp/demo" --title "Release Smoke" --json
          cd "$tmp/demo"
          "$tmp/openathor/dist/cli.js" doctor --json

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: openathor-release-bundle
          path: |
            release/openathor.tar.gz
            release/openathor.tar.gz.sha256

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --title "OpenAthor $tag" \
              --notes "Install with: curl -fsSL https://raw.githubusercontent.com/huanghuoguoguo/openathor/main/scripts/install.sh | sh"
          fi
          gh release upload "$tag" \
            release/openathor.tar.gz \
            release/openathor.tar.gz.sha256 \
            --clobber
