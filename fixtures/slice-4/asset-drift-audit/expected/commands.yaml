commands:
  - run: openathor doctor --json
    ok: true
    expect_data:
      checks.standard_assets_present: true
  - run: openathor assets audit --json
    ok: true
    expect_data:
      audit.counts.characters: 3
      audit.counts.unresolved_outline_links: 1
      audit.counts.character_link_drifts: 1
      audit.counts.weak_character_profile_summaries: 2
      audit.counts.summary_drift_candidates: 0
      audit.character_profile_summary.0.character_id: char_lin_ya
      audit.character_profile_summary.0.linked_chapter_count: 3
      audit.character_profile_summary.0.coverage_ratio: 0.13
      audit.character_profile_summary.2.character_id: char_meng_qi
      audit.character_profile_summary.2.linked_chapter_count: 0
      audit.character_profile_summary.2.mentioned_chapter_count: 1
      audit.outline_link_issues.0.link: char_missing
      audit.chapter_entity_coverage.2.missing_character_links.0: 孟齐
    expect_warnings:
      - OA_ASSET_CHARACTER_PROFILE_WEAK
  - run: openathor index rebuild --json
    ok: true
    expect_data:
      chapters_indexed: 3
