commands:
  - run: openathor adopt --json
    ok: true
  - run: openathor draft chapter next --task "写第一章《钟楼齿轮》" --text "# 钟楼齿轮\n\n沈砚和顾青禾在旧钟楼齿轮室发现北港纹章铜钥匙。港口蓝灯异常亮起，失踪钟表匠的线索被重新打开。" --confirm-write --json
    ok: true
    expect_data:
      target.id: ch_002
      target.title: 钟楼齿轮
      source_hash: sha256:8042a8244e517b3402ec02eafa3d7e71566731641bf07f17a6425ee7c5c4ae57
  - run: openathor assets sync chapter 2 --from notes/asset-package-pi.yaml --json
    ok: true
    expect_data:
      mode: proposal
      result.characters_added: 2
      result.timeline_events_added: 2
      result.hooks_added: 1
      result.outline_modified: true
      sync.summary.package_hooks: 1
      sync.outline_links.timeline_events.0: event_blue_light_anomaly
      sync.outline_links.timeline_events.1: event-key-found
  - run: openathor assets sync chapter 2 --from notes/asset-package-pi.yaml --confirm --base-hash current:manuscript/chapter-002.md --json
    ok: true
    expect_data:
      mode: confirmed_write
      result.characters_added: 2
      result.timeline_events_added: 2
      result.hooks_added: 1
      result.confirmed_assets_written: true
  - run: openathor assets audit --json
    ok: true
    expect_data:
      audit.counts.characters: 2
      audit.counts.timeline_events: 2
      audit.counts.hooks: 1
      audit.counts.unresolved_outline_links: 0
      audit.assets.hooks.0.id: hook-blue-light
  - run: openathor context chapter 2 --json
    ok: true
    expect_data:
      outline.chapters.1.links.hooks.0: hook-blue-light
      outline.chapters.1.links.timeline_events.0: event_blue_light_anomaly
    expect_data_path: assets.characters.text
  - run: openathor index rebuild --json
    ok: true
  - run: openathor doctor --json --strict
    ok: true
