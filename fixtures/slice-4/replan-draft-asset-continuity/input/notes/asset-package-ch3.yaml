    summary: 许岚承认客轮失火前夜见过林砚，林砚交给她封蜡账册并要求等蓝钥匙出现。
  - id: event-third-fog-horn-ledger
    title: 封蜡账册记录第三次雾笛暗号
    summary: 封蜡账册记录第三次雾笛代表有人从船舱内部开锁的暗号。
hooks:
