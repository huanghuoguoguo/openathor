commands:
  - run: openathor adopt --json
    ok: true
  - run: openathor style analyze "设定/线索.md" --profile-id style_clues --name "线索笔记风格" --json
    ok: true
    expect_data:
      mode: pending_profile
      profile.id: style_clues
      profile.status: pending
      reference.path: 设定/线索.md
      result.profile_status: pending
      result.manuscript_modified: false
      result.reference_text_copied: false
  - run: openathor style profile show --json
    ok: true
    expect_data_path: profiles.text
  - run: openathor style check chapter 1 --json
    ok: true
    expect_data:
      method: deterministic_style_metric_scan
    expect_data_path: metrics.target.average_sentence_chars
  - run: openathor style revise chapter 1 --json
    ok: false
    error_code: OA_COMMAND_NOT_IMPLEMENTED
  - run: openathor style profile apply style_main --json
    ok: false
    error_code: OA_COMMAND_NOT_IMPLEMENTED
  - run: openathor doctor --json
    ok: true
  - run: openathor index rebuild --json
    ok: true
